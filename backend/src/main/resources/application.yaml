spring:
  datasource:
    url: jdbc:h2:mem:mantenedordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    try-it-out-enabled: false

logging:
  level:
    org.springframework: INFO

swagger:
  info:
    title: "Mantenedor de Usuarios API"
    description: "API REST simple para crear, listar, actualizar y eliminar usuarios."
    version: "1.0"
    name: "Roberto Salinas"
    contact:
      name: "Roberto Salinas"
      email: "roberto.ismael90@gmail.com"
