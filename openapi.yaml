openapi: 3.1.0
info:
  title: Mantenedor de Usuarios API
  version: 1.0.0
  description: API REST para gestionar usuarios con operaciones CRUD.
servers:
  - url: http://localhost:8080/api
paths:
  /users:
    get:
      summary: Listar todos los usuarios
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
    post:
      summary: Crear un nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      summary: Obtener un usuario por ID
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Usuario no encontrado
    put:
      summary: Actualizar un usuario existente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      summary: Eliminar un usuario
      responses:
        '204':
          description: Usuario eliminado
components:
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    UserRequest:
      type: object
      required:
        - nombres
        - apellidos
        - rut
        - dv
        - fechaNacimiento
        - correoElectronico
        - contrasena
      properties:
        nombres:
          type: string
        apellidos:
          type: string
        rut:
          type: integer
          format: int64
        dv:
          type: string
        fechaNacimiento:
          type: string
          format: date
        correoElectronico:
          type: string
          format: email
        contrasena:
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombres:
          type: string
        apellidos:
          type: string
        rut:
          type: integer
          format: int64
        dv:
          type: string
        fechaNacimiento:
          type: string
          format: date
        correoElectronico:
          type: string
          format: email
